<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Canto | Juntos Hacia Dios</title>

  <meta
    name="description"
    content="Letra, acordes, tono, capo, artistas y recursos de una canción de Juntos Hacia Dios."
  />

  <link rel="stylesheet" href="style.css?v=10" />

  <style>
    @media (max-width: 768px) {
      header {
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 16px;
      }

      .brand {
        max-width: 72%;
        font-size: 0.95rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .menu-toggle {
        display: inline-flex !important;
      }

      .nav-menu {
        display: none !important;
        position: absolute;
        top: 62px;
        left: 14px;
        right: 14px;
        flex-direction: column;
        align-items: stretch;
        gap: 8px;
        padding: 16px;
        border-radius: 18px;
        background: var(--card);
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
      }

      .nav-menu.show-menu {
        display: flex !important;
      }

      .nav-menu a,
      .nav-menu button {
        width: 100%;
        text-align: left;
      }

      .song-page-section {
        padding: 22px 14px;
      }

      .song-detail-card {
        padding: 18px;
        border-radius: 18px;
      }

      .song-detail-card h1 {
        font-size: 1.9rem;
        line-height: 1.1;
        word-break: break-word;
      }

      .capo-box,
      .transpose-box {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px;
        padding: 14px;
      }

      .capo-box span,
      .transpose-box span {
        width: 100%;
        text-align: center;
      }

      .song-btn.small-btn {
        padding: 10px 14px;
        font-size: 0.82rem;
      }

      .lyrics-block {
        width: 100%;
        max-width: 100%;
        overflow-x: auto;
        padding: 18px;
        font-size: 15px;
        line-height: 1.35;
        white-space: pre;
        font-family: "Courier New", Courier, monospace;
      }

      .chord-line {
        display: block;
        color: var(--accent);
        font-weight: 800;
        line-height: 1.1;
        min-height: 1.1em;
        white-space: pre;
      }

      .lyric-line {
        display: block;
        color: var(--text);
        line-height: 1.45;
        margin-bottom: 12px;
        white-space: pre;
      }
    }

    @media (max-width: 420px) {
      .song-detail-card h1 {
        font-size: 1.55rem;
      }

      .lyrics-block {
        font-size: 14px;
        padding: 16px;
      }
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js?v=10"></script>
  <script src="app.js?v=10" defer></script>
</head>

<body>
  <header>
    <nav class="navbar">
      <a class="brand" href="index.html" aria-label="Juntos Hacia Dios">
        <span class="brand-icon">✝</span>
        <span>Juntos Hacia Dios</span>
      </a>

      <button class="menu-toggle" id="menuToggle" type="button" aria-label="Abrir menú">
        ☰
      </button>

      <div class="nav-menu" id="navMenu">
        <a href="index.html">Inicio</a>
        <a href="canciones.html" class="active">Canciones</a>
        <a href="artistas.html">Artistas</a>
        <a href="categorias.html">Categorías</a>
        <a href="donaciones.html">Donaciones</a>

        <button class="theme-toggle" id="themeToggle" type="button" aria-label="Cambiar tema">
          🌙
        </button>
      </div>
    </nav>
  </header>

  <main>
    <section class="section song-page-section">
      <div id="songPage">
        <article class="song-detail-card shimmer-card">
          <p class="artists-line">Cargando canto...</p>
          <h1>Un momento por favor</h1>
          <p>Estamos preparando la letra y los acordes.</p>
        </article>
      </div>
    </section>
  </main>

  <footer>
    <p>© <span id="year">2026</span> Juntos Hacia Dios</p>
    <p>
      <a href="canciones.html">Canciones</a>
      ·
      <a href="artistas.html">Artistas</a>
      ·
      <a href="categorias.html">Categorías</a>
    </p>
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    document.addEventListener("DOMContentLoaded", function () {
      var menu = document.getElementById("navMenu");
      var button = document.getElementById("menuToggle");

      if (menu && button) {
        button.addEventListener("click", function () {
          menu.classList.toggle("show-menu");
        });
      }
    });
  </script>

</body>
</html>
